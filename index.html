<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nails by Dessy</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --pink-light: #f8d7e2;
  --pink-mid: #f6c1cf;
  --pink-dark: #d24b7c;
  --black: #111;
  --white: #fff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(180deg, var(--pink-mid), var(--pink-light));
  color: var(--black);
  line-height: 1.6;
  min-height: 100vh;
}

.overlay {
  background: rgba(255,255,255,0.65);
  min-height: 100vh;
  padding-bottom: 4rem;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 2rem 1.5rem 4rem;
}

.brand {
  background: var(--black);
  color: var(--white);
  text-align: center;
  padding: 1rem 2rem;
  border-radius: 12px;
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  letter-spacing: 1px;
  margin-bottom: 3rem;
}

.price-section {
  background: rgba(255,255,255,0.9);
  border-radius: 20px;
  padding: 2rem;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  margin-bottom: 3rem;
}

.price-section h2 {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  margin-bottom: 1.5rem;
  text-align: center;
}

.service { margin-bottom: 2rem; }

.service h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  margin-bottom: 0.75rem;
}

.price-list { list-style: none; }

.price-list li {
  display: flex;
  justify-content: space-between;
  padding: 0.4rem 0;
  font-weight: 500;
  color: var(--pink-dark);
}

.cta { text-align: center; }

.cta button {
  background: var(--black);
  color: var(--white);
  padding: 1rem 2rem;
  border: none;
  border-radius: 14px;
  font-size: 1.1rem;
  font-weight: 500;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

.cta small {
  display: block;
  margin-top: 0.75rem;
  font-size: 0.8rem;
}

.booking-section {
  margin-top: 3rem;
  background: rgba(255,255,255,0.95);
  padding: 2rem;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.booking-section h3 {
  font-family: 'Playfair Display', serif;
  margin-bottom: 1rem;
  text-align: center;
}

footer {
  margin-top: 4rem;
  text-align: center;
  font-size: 0.9rem;
  opacity: 0.85;
}

@media (max-width: 600px) {
  .brand { font-size: 1.6rem; }
  .price-section { padding: 1.5rem; }
  .booking-section { padding: 1.5rem; }
}
</style>
</head>

<body>
<div class="overlay">
<div class="container">

<div class="brand">Nails by Dessy</div>

<section class="price-section">
  <h2>Price List</h2>

  <div class="service">
    <h3>Gel X Full Set</h3>
    <ul class="price-list">
      <li><span>1 Color</span><span>$50</span></li>
      <li><span>Full Designed</span><span>$65</span></li>
      <li><span>Take Off</span><span>$25</span></li>
    </ul>
  </div>

  <div class="service">
    <h3>Gel Polish</h3>
    <ul class="price-list">
      <li><span>1 Color</span><span>$30</span></li>
      <li><span>Full Designed</span><span>$45</span></li>
      <li><span>Take Off & Shaped</span><span>$15</span></li>
    </ul>
  </div>
</section>

<div class="cta">
  <button id="bookBtn">Book Appointment</button>
  <small>A deposit is required at time of booking.</small>
</div>

<div class="booking-section" id="bookingSection" style="display:none;">
  <h3>Book Your Appointment</h3>

  <!-- Square Embedded Booking Widget -->
  <script src="https://square.site/appointments/buyer/widget/ickunwmfpcaaeq/LFPSTBSCC5S2B.js"></script>
</div>

<footer>
  © 2026 Nails by Dessy · Booking powered by Square
</footer>

</div>
</div>

<script>
const bookBtn = document.getElementById('bookBtn');
const bookingSection = document.getElementById('bookingSection');

bookBtn.addEventListener('click', () => {
  bookingSection.style.display = 'block';
  bookingSection.scrollIntoView({ behavior: 'smooth' });
});
</script>

</body>
</html>
