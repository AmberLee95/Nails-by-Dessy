<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Nails by Dessy — Book</title>
<meta name="description" content="Book an appointment with Nails by Dessy. Deposits required at checkout." />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --pink-light:#f8d7e2;
  --pink-mid:#f6c1cf;
  --pink-dark:#d24b7c;
  --black:#111;
  --white:#fff;
  --radius:14px;
  --gap:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Poppins",sans-serif;
  background:linear-gradient(180deg,var(--pink-mid),var(--pink-light));
  color:var(--black);
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:1.5rem;
}

/* container that matches the rest of the site */
.container {
  width:100%;
  max-width:1100px;
  background:rgba(255,255,255,0.98);
  border-radius:16px;
  box-shadow:0 30px 80px rgba(0,0,0,0.12);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  min-height:80vh;
}

/* header */
.header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:1rem;
  padding:1rem 1.25rem;
  border-bottom:1px solid rgba(0,0,0,0.04);
}
.brand { display:flex; align-items:center; gap:0.9rem; }
.logo {
  width:48px; height:48px; border-radius:12px;
  background:linear-gradient(135deg,var(--pink-dark),#ff9fc2);
  display:flex; align-items:center; justify-content:center; color:var(--white);
  font-weight:700; font-family:'Playfair Display',serif;
}
.brand h1{ font-family:'Playfair Display',serif; font-size:1.05rem; margin:0; }
.back-link{ color:var(--black); text-decoration:none; font-weight:600; }

/* selected service bar */
.selected-service {
  display:none;
  align-items:center;
  justify-content:space-between;
  gap:1rem;
  padding:0.9rem 1.25rem;
  border-bottom:1px solid rgba(0,0,0,0.04);
  background:linear-gradient(180deg, rgba(255,255,255,0.99), rgba(255,255,255,0.98));
}
.selected-service .label { font-weight:600; font-family:'Playfair Display',serif; }
.selected-service .name { margin-top:4px; font-weight:600; }

/* iframe area */
.iframe-wrap {
  padding:1.25rem;
  flex:1 1 auto;
  display:flex;
  flex-direction:column;
  gap:0.75rem;
}
.iframe-card {
  flex:1 1 auto;
  border-radius:12px;
  overflow:hidden;
  background:#fff;
  box-shadow:0 12px 40px rgba(0,0,0,0.06);
  border:1px solid rgba(0,0,0,0.03);
  min-height:420px;
}
iframe.booking-iframe {
  width:100%;
  height:100%;
  border:0;
  display:block;
}

/* note and fallback */
.note { font-size:0.95rem; color:#333; }
.fallback { display:none; gap:0.5rem; align-items:flex-start; margin-top:0.5rem; flex-wrap:wrap; }
.fallback textarea { flex:1 1 320px; min-height:72px; border-radius:10px; border:1px solid #eee; padding:0.6rem; }
.copy-btn { background:var(--black); color:#fff; border:none; padding:0.6rem 0.9rem; border-radius:10px; cursor:pointer; }

/* footer */
.site-footer { padding:1rem 1.25rem; text-align:center; font-size:0.9rem; color:rgba(0,0,0,0.6); }

/* responsive */
@media (min-width:1000px){
  .container { margin-top:2.5rem; }
  .iframe-wrap { height: calc(100vh - 220px); }
}
@media (max-width:600px){
  body{padding:0.75rem}
  .header{padding:0.75rem}
  .iframe-wrap{padding:0.9rem}
  .iframe-card{border-radius:10px}
}
</style>
</head>
<body>
<div class="container" role="main" aria-labelledby="book-title">
  <header class="header">
    <div class="brand">
      <a href="index.html" class="back-link" aria-label="Back to home">← Home</a>
      <div style="display:flex;flex-direction:column;">
        <h1 id="book-title">Book with Dessy</h1>
        <div style="font-size:0.85rem;color:#666;margin-top:4px">Deposits collected at checkout</div>
      </div>
    </div>
    <div>
      <button id="openInTab" class="copy-btn" aria-label="Open booking in new tab">Open in new tab</button>
    </div>
  </header>

  <div class="selected-service" id="selectedServiceBar" aria-live="polite">
    <div>
      <div class="label">Selected</div>
      <div id="selectedServiceName" class="name"></div>
    </div>
    <div>
      <button id="clearBtn" class="copy-btn" style="background:transparent;color:var(--black);border:1px solid rgba(0,0,0,0.06)">Clear</button>
    </div>
  </div>

  <div class="iframe-wrap">
    <div class="note" id="note">If the booking surface does not load, use Open in new tab.</div>

    <div class="iframe-card" id="iframeCard">
      <!-- iframe will be set by script -->
      <iframe id="bookingIframe" class="booking-iframe" src="" title="Book with Nails by Dessy" loading="lazy" allow="payment *; geolocation *"></iframe>
    </div>

    <div class="fallback" id="fallback">
      <textarea id="bookingCopy" readonly aria-label="Booking information"></textarea>
      <button id="copyBtn" class="copy-btn">Copy</button>
    </div>
  </div>

  <footer class="site-footer">© 2026 Nails by Dessy · Booking powered by Square</footer>
</div>

<script>
/*
  Square booking URL provided by user:
  https://app.squareup.com/appointments/book/ickunwmfpcaaeq/LFPSTBSCC5S2B/start
  This file uses that URL as the embedded booking surface.
*/

const SQUARE_BOOKING_URL = 'https://app.squareup.com/appointments/book/ickunwmfpcaaeq/LFPSTBSCC5S2B/start';

const selectedServiceBar = document.getElementById('selectedServiceBar');
const selectedServiceName = document.getElementById('selectedServiceName');
const bookingIframe = document.getElementById('bookingIframe');
const fallback = document.getElementById('fallback');
const bookingCopy = document.getElementById('bookingCopy');
const copyBtn = document.getElementById('copyBtn');
const openInTab = document.getElementById('openInTab');
const clearBtn = document.getElementById('clearBtn');
const note = document.getElementById('note');

function getQueryParam(name){
  const params = new URLSearchParams(window.location.search);
  return params.get(name);
}

let selectedService = getQueryParam('service') || '';
if (selectedService) {
  selectedService = decodeURIComponent(selectedService);
  selectedServiceName.textContent = selectedService;
  selectedServiceBar.style.display = 'flex';
  bookingCopy.value = `Service: ${selectedService}`;
  fallback.style.display = 'flex';
}

// Build iframe URL. We append a ref param for tracking; Square may not auto-select a service.
function buildIframeUrl(){
  try {
    const url = new URL(SQUARE_BOOKING_URL);
    if (selectedService) url.searchParams.set('ref_service', selectedService);
    return url.toString();
  } catch (e) {
    return SQUARE_BOOKING_URL;
  }
}

// Try to load the iframe and detect if it was blocked by X-Frame-Options
function loadIframe(){
  const url = buildIframeUrl();
  bookingIframe.src = url;

  // After a short delay, check if iframe loaded by attempting to detect obvious failures
  setTimeout(() => {
    const win = bookingIframe.contentWindow;
    const blocked = !win || bookingIframe.clientHeight === 0;
    if (blocked) {
      note.textContent = 'Booking page could not be embedded. Use Open in new tab to continue.';
      if (selectedService) fallback.style.display = 'flex';
    } else {
      note.textContent = 'Complete your booking in the embedded booking surface below.';
      fallback.style.display = selectedService ? 'flex' : 'none';
    }
  }, 900);
}

// Open booking URL in a new tab (fallback)
openInTab.addEventListener('click', () => {
  const url = buildIframeUrl();
  window.open(url, '_blank', 'noopener');
});

// copy fallback text
copyBtn.addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(bookingCopy.value);
    copyBtn.textContent = 'Copied';
    setTimeout(() => copyBtn.textContent = 'Copy', 1500);
  } catch {
    bookingCopy.select();
    document.execCommand('copy');
    copyBtn.textContent = 'Copied';
    setTimeout(() => copyBtn.textContent = 'Copy', 1500);
  }
});

// clear selection
clearBtn.addEventListener('click', () => {
  selectedService = '';
  selectedServiceBar.style.display = 'none';
  fallback.style.display = 'none';
  bookingCopy.value = '';
  // reload iframe without ref param
  bookingIframe.src = SQUARE_BOOKING_URL;
});

// Auto-load iframe
loadIframe();
</script>
</body>
</html>
